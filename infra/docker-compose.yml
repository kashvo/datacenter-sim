version: "3.9"

networks:
  dcsim-net:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:

services:
  fastapi:
    build:
      context: ..
      dockerfile: app/Dockerfile
    container_name: dcsim-fastapi
    ports:
      - "8000:8000"
    volumes:
      - ../logs/fastapi:/code/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - dcsim-net

  locust-master:
    build:
      context: ..
      dockerfile: locust/Dockerfile
    container_name: dcsim-locust-master
    command: >
      --master
      --host http://fastapi:8000
    ports:
      - "8089:8089"
    depends_on:
      fastapi:
        condition: service_healthy
    networks:
      - dcsim-net

  locust-worker:
    build:
      context: ..
      dockerfile: locust/Dockerfile
    command: >
      --worker
      --master-host locust-master
    depends_on:
      - locust-master
    networks:
      - dcsim-net

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: dcsim-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - fastapi
    networks:
      - dcsim-net

  node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: dcsim-node-exporter
    ports:
      - "9100:9100"
    networks:
      - dcsim-net

  grafana:
    image: grafana/grafana:11.0.0
    container_name: dcsim-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ../monitoring/dashboards:/etc/grafana/provisioning/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    networks:
      - dcsim-net
